name: Deployment Test
on: push
jobs: 
    lint:
      runs-on: ubuntu-latest
      steps:
        - name: Gets Code
          uses: actions/checkout@v3
        - name: Install NodeJS Dependencies
          uses: actions/setup-node@v3
        - name: Install Dependencies
          run: npm ci
        - name: Lint
          run: npm run lint

    test: 
        needs: lint
        runs-on: ubuntu-latest
        steps:
            - name: Gets Code
              uses: actions/checkout@v3
            - name: Install NodeJS Dependencies
              uses: actions/setup-node@v3
            - name: Install Dependencies
              run: npm ci
            - name: Run test
              run: npm run test
            - name: Testing
              run: echo "Testing ......"

    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v3
            - name: Install NodeJS
              uses: actions/setup-node@v3
            - name: Install dependencies
              run: npm ci
            - name: Build project
              run: npm run build
            - name: Deploy
              run: echo "Deploying ....."

