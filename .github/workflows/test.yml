name: Test Project
on: [push, workflow_dispatch]
jobs: 
    test: 
        runs-on: ubuntu-latest
        steps:
            - name: Gets Code
              uses: actions/checkout@v3
            - name: Install NodeJS
              uses: actions/setup-node@v3
              with:
                node-version: 24
            - name: Install Dependencies
              run: npm ci
            - name: Run test
              run: echo "Test is Successfull"
    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v3
            - name: Install NodeJS
              uses: actions/setup-node@v3
              with:
                node-version: 24
            - name: Install dependencies
              run: npm ci
            - name: Build project
              run: npm run build
            - name: Deploy
              run: echo "Deploying"

